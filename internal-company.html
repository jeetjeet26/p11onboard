<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P11creative | Internal Company Manager</title>
    <style>
      :root {
        --red: #fa4614;
        --charcoal: #1a1a1a;
        --bg: #f5f5f3;
        --white: #ffffff;
        --border: #e3e2df;
        --gray: #767676;
        --green: #1a9e6a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--charcoal);
      }

      body.auth-gate-pending {
        opacity: 0;
      }

      .header {
        background: var(--charcoal);
        color: white;
        border-bottom: 3px solid var(--red);
        padding: 14px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .mark {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        background: var(--red);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 12px;
      }

      .brand-title {
        font-size: 16px;
        font-weight: 800;
      }

      .brand-title span {
        color: var(--red);
      }

      .brand-sub {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .nav a {
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        padding: 6px 11px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .nav a.active {
        background: var(--red);
        border-color: var(--red);
      }

      .main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px 20px 40px;
      }

      .card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
      }

      .title-row h1 {
        margin: 0;
        font-size: 24px;
      }

      .subtitle {
        margin: 6px 0 14px;
        color: var(--gray);
        font-size: 13px;
      }

      .form-row {
        display: flex;
        align-items: end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .field label {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .field input {
        min-width: 280px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 11px;
        font-size: 13px;
        font-family: inherit;
      }

      .field input:focus {
        outline: none;
        border-color: var(--red);
        box-shadow: 0 0 0 2px rgba(250, 70, 20, 0.1);
      }

      .btn {
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .btn.primary {
        border-color: var(--red);
        background: var(--red);
        color: #fff;
      }

      .status {
        margin-top: 10px;
        min-height: 16px;
        font-size: 12px;
        color: var(--gray);
      }

      .status.error {
        color: #cc2e17;
      }

      .status.success {
        color: var(--green);
      }

      .table-wrap {
        margin-top: 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }

      th {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--gray);
      }

      .table-action-btn {
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }

      .table-action-btn:hover {
        border-color: var(--red);
        color: var(--red);
      }
    </style>
  </head>
  <body class="auth-gate-pending">
    <header class="header">
      <div class="brand">
        <div class="mark">P11</div>
        <div>
          <div class="brand-title">P11<span>creative</span></div>
          <div class="brand-sub">Internal Company Manager</div>
        </div>
      </div>
      <nav class="nav" aria-label="App Navigation">
        <a href="/internal.html">Home</a>
        <a class="active" href="/internal-company.html">Companies</a>
        <a href="/internal-client-editor.html">Client Editor</a>
        <a href="/p11-onboarding-automation-flow.html">Automation Flow</a>
        <a href="/p11-onboarding-project-brief.html">Project Brief</a>
      </nav>
    </header>

    <main class="main">
      <section class="card">
        <div class="title-row">
          <h1 id="companyTitle">Company</h1>
          <button class="btn" id="newCommunityBtn" type="button">Create Community</button>
        </div>
        <p class="subtitle" id="companyMeta">Manage company details and related communities.</p>

        <div class="form-row">
          <div class="field">
            <label for="companyNameInput">Company Name</label>
            <input id="companyNameInput" type="text" />
          </div>
          <button class="btn primary" id="saveCompanyBtn" type="button">Save Company</button>
          <a class="btn" href="/internal.html">Back to Internal Home</a>
        </div>
        <div class="status" id="companyStatus"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Community</th>
                <th>Stage</th>
                <th>Status</th>
                <th>Go Live</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="companyCommunityBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/runtime-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./frontend/src/internal-static-guard.js"></script>
    <script type="module" src="./frontend/src/internal-company-main.js"></script>
  </body>
</html>
